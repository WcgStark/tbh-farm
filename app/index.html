<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
<title>TBH Farm</title>
<style>
:root {
  --bg:     #0a0e1a;
  --card:   #111827;
  --card2:  #0e1520;
  --line:   #1e2a42;
  --gold:   #f6c552;
  --exp:    #5fd0e0;
  --good:   #74d28e;
  --warn:   #ffa94d;
  --bad:    #ff6b6b;
  --violet: #a98cff;
  --mut:    #6a7d90;
  --text:   #c8d8e8;
  --px: 'JetBrains Mono', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 14px; overflow-x: hidden; }

/* ── header ─────────────────────────────── */
#hdr {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px; background: var(--card2);
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 10;
  -webkit-app-region: drag;
}
#hdr .logo { font-family: var(--px); font-weight: 700; font-size: 15px; letter-spacing: 2px; color: var(--gold); }
#hdr .logo span { color: var(--exp); }
#hdr .spacer { flex: 1; }
#statusDot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--mut); transition: background .4s;
}
#statusDot.live { background: var(--good); box-shadow: 0 0 6px var(--good); }
#statusDot.err  { background: var(--bad); }
#statusTxt { font-family: var(--px); font-size: 11px; letter-spacing: .5px; color: var(--mut); }
#refreshBtn, #langBtn {
  -webkit-app-region: no-drag;
  background: none; border: 1px solid var(--line); border-radius: 6px;
  color: var(--mut); cursor: pointer; padding: 3px 8px; font-size: 12px;
  transition: border-color .2s, color .2s;
}
#langBtn { font-family: var(--px); font-size: 10px; letter-spacing: .5px; min-width: 34px; }
#refreshBtn:hover, #langBtn:hover { border-color: var(--exp); color: var(--exp); }
#readonlyBadge {
  font-family: var(--px); font-size: 9px; letter-spacing: .6px;
  color: var(--good); border: 1px solid #74d28e40; border-radius: 4px;
  padding: 2px 7px; opacity: .75;
}

/* ── party info bar ──────────────────────── */
#partyBar {
  display: flex; gap: 8px; align-items: center;
  padding: 8px 18px; background: var(--card2);
  border-bottom: 1px solid var(--line);
  font-family: var(--px); font-size: 11px; letter-spacing: .3px; color: var(--mut);
}
#partyBar b { color: var(--text); }
#partyBar .g { color: var(--gold); }
#partyBar .x { color: var(--exp); }
#partyBar .sep { opacity: .4; }

/* ── main content ────────────────────────── */
#main { padding: 18px; max-width: 1120px; }

/* ── farm cards ──────────────────────────── */
#cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; margin-bottom: 22px;
}
.fcard {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden;
}
.fcard::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.fcard.now::before    { background: var(--exp); }
.fcard.gold::before   { background: var(--gold); }
.fcard.exp::before    { background: var(--good); }
.fcard.push::before   { background: var(--violet); }
.fcard .tag {
  font-family: var(--px); font-size: 9.5px; letter-spacing: 1px;
  color: var(--mut); text-transform: uppercase; margin-bottom: 8px; display: block;
}
.fcard.now  .tag { color: var(--exp); }
.fcard.gold .tag { color: var(--gold); }
.fcard.exp  .tag { color: var(--good); }
.fcard.push .tag { color: var(--violet); }
.fcard .stage-id {
  font-family: var(--px); font-size: 22px; font-weight: 700;
  color: var(--text); line-height: 1;
}
.fcard .stage-name {
  font-size: 11.5px; color: var(--mut); margin: 3px 0 10px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fcard .rates { font-size: 12px; }
.fcard .rates .g { color: var(--gold); font-weight: 600; }
.fcard .rates .x { color: var(--exp); font-weight: 600; }
.diff-badge {
  font-family: var(--px); font-size: 9px; letter-spacing: .5px;
  padding: 1px 5px; border-radius: 4px; border: 1px solid currentColor;
  margin-left: 6px; vertical-align: middle; opacity: .85; white-space: nowrap;
}

/* ── table section ───────────────────────── */
#tbl-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
#tbl-head {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}
#tbl-head .lbl { font-family: var(--px); font-size: 10px; letter-spacing: .5px; color: var(--mut); margin-right: 4px; }
.sort-btn, .hz-btn {
  background: none; border: 1px solid var(--line); border-radius: 5px;
  color: var(--mut); cursor: pointer; padding: 3px 9px;
  font-family: var(--px); font-size: 11px; letter-spacing: .3px;
  transition: border-color .15s, color .15s, background .15s;
}
.sort-btn.on, .hz-btn.on {
  border-color: var(--exp); color: var(--exp); background: #5fd0e014;
}
.sort-btn:not(.on):hover, .hz-btn:not(.on):hover { border-color: var(--line); color: var(--text); }
#tbl-head .spacer { flex: 1; }
#calNote { font-family: var(--px); font-size: 10px; color: var(--mut); }
#calNote.ok { color: var(--good); }

table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: right; padding: 9px 12px;
  font-family: var(--px); font-size: 10px; letter-spacing: .4px; color: var(--mut);
  border-bottom: 1px solid var(--line); white-space: nowrap;
}
thead th:first-child { text-align: left; }
tbody tr { border-bottom: 1px solid #0d1422; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #ffffff06; }
tbody tr.is-cur { background: #5fd0e00a; }
tbody tr.is-best-gold { background: #f6c5520a; }
tbody tr.is-best-exp  { background: #74d28e0a; }
tbody td { padding: 7px 12px; text-align: right; color: var(--mut); font-variant-numeric: tabular-nums; font-size: 13px; }
tbody td:first-child { text-align: left; }
.td-label { font-family: var(--px); font-size: 12px; font-weight: 600; color: var(--text); }
.td-name  { font-size: 11px; color: var(--mut); }
.td-g { color: var(--gold); }
.td-x { color: var(--exp); }
.td-proj { color: var(--text); }
.row-badge {
  display: inline-block; font-family: var(--px); font-size: 8.5px; letter-spacing: .4px;
  padding: 1px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle;
}
.rb-cur  { background: #5fd0e022; color: var(--exp); border: 1px solid #5fd0e040; }
.rb-gold { background: #f6c55222; color: var(--gold); border: 1px solid #f6c55240; }
.rb-exp  { background: #74d28e22; color: var(--good); border: 1px solid #74d28e40; }

/* ── error / loading states ──────────────── */
#overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 14px; text-align: center; padding: 32px;
}
#overlay .icon { font-size: 40px; margin-bottom: 4px; }
#overlay h2 { font-size: 17px; color: var(--text); }
#overlay p  { font-size: 13px; color: var(--mut); max-width: 460px; line-height: 1.6; }
#overlay code {
  font-family: var(--px); font-size: 11px; background: var(--card);
  border: 1px solid var(--line); border-radius: 6px; padding: 8px 14px;
  color: var(--warn); display: block; margin-top: 4px; text-align: left; line-height: 1.8;
}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo">TBH <span>FARM</span></div>
  <div class="spacer"></div>
  <button id="langBtn" onclick="toggleLang()">EN</button>
  <span id="readonlyBadge"></span>
  <div id="statusDot"></div>
  <div id="statusTxt"></div>
  <button id="refreshBtn" onclick="forceRefresh()">↺</button>
</div>

<div id="partyBar" style="display:none">
  <span id="pPartyLbl"></span> <b id="pLv">—</b>
  <span class="sep">·</span> <span id="pGoldLbl"></span> <span class="g"><b id="pGold">—</b></span>
  <span class="sep">·</span> <span id="pExpLbl"></span> <span class="x"><b id="pExp">—</b></span>
  <span class="sep">·</span> <span id="pCal" style="color:var(--mut)"></span>

<div id="main">
  <div id="overlay"></div>
  <div id="content" style="display:none">
    <div id="cards"></div>
    <div id="tbl-wrap">
      <div id="tbl-head">
        <span class="lbl" id="sortLbl"></span>

        <button class="hz-btn" data-h="3"  onclick="setHorizon(this)">3h</button>
        <button class="hz-btn on" data-h="5" onclick="setHorizon(this)">5h</button>
        <button class="hz-btn" data-h="8"  onclick="setHorizon(this)">8h</button>
        <span id="calNote"></span>
      </div>
      <div id="tbl-body"></div>
    </div>
  </div>
</div>

<script src="../engine/gamedata.js"></script>
<script src="../engine/i18n.js"></script>
<script src="../engine/engine.js"></script>
<script>
'use strict';

const PASSWORD = 'emuMqG3bLYJ938ZDCfieWJ';
const ENG = window.TBHEngine;
const DB  = window.TBH_DB;
const I18N = window.TBH_I18N;

/* ── i18n ─────────────────────────────────── */
const STRINGS = {
  en: {
    locale: 'en-US',
    readonly: 'READ-ONLY',
    readonlyTitle: 'Reads the save locally. Never writes to it or touches the game process.',
    st_waiting: 'waiting…', st_reading: 'reading save…', st_live: 'live',
    st_readErr: 'error reading save', st_notFound: 'save not found', st_error: 'error',
    partyLv: 'Party Lv', gold: 'Gold', exp: 'EXP',
    loadingTitle: 'Loading save…', loadingMsg: 'Looking for the TBH save file…',
    sortLbl: 'Sort:', projLbl: 'Projection:', sortGold: 'GOLD', sortExp: 'EXP',
    colStage: 'Stage',
    cardNow: 'NOW', cardGold: 'BEST GOLD', cardExp: 'BEST EXP', cardPush: 'PUSH',
    rateGoldH: 'gold/h', rateExpH: 'exp/h',
    bNow: 'now', bGold: 'best gold', bExp: 'best exp',
    diff_NIGHTMARE: 'Nightmare', diff_HELL: 'Hell', diff_TORMENT: 'Torment',
    noStages: 'No stage available yet.',
    cal_none: 'no calibration', cal_noneNote: '(estimated model)',
    cal_calibrating: 'calibrating…', cal_fit: 'calibrated ({0} stages)', cal_live: 'calibrated (live)',
    cal_hint: 'Keep the game open and farming — it calibrates once the game autosaves a couple of times with gold gained (≈1–2 min). The number is the samples collected so far.',
    err_decryptTitle: 'Error decrypting save',
    err_decryptMsg: 'It may be a game-version issue. ',
    err_notFoundTitle: 'Save not found',
    err_notFoundMsg: 'TBH must be installed and opened at least once.\n\nExpected path:\n{0}',
    err_readTitle: 'Error reading the file',
  },
  pt: {
    locale: 'pt-BR',
    readonly: 'SOMENTE LEITURA',
    readonlyTitle: 'Lê o save localmente. Nunca escreve nem toca no processo do jogo.',
    st_waiting: 'aguardando…', st_reading: 'lendo save…', st_live: 'ao vivo',
    st_readErr: 'erro ao ler save', st_notFound: 'save não encontrado', st_error: 'erro',
    partyLv: 'Party Lv', gold: 'Ouro', exp: 'EXP',
    loadingTitle: 'Carregando save…', loadingMsg: 'Procurando o arquivo de save do TBH…',
    sortLbl: 'Ordenar:', projLbl: 'Projeção:', sortGold: 'OURO', sortExp: 'EXP',
    colStage: 'Estágio',
    cardNow: 'AGORA', cardGold: 'MELHOR OURO', cardExp: 'MELHOR EXP', cardPush: 'AVANÇAR',
    rateGoldH: 'ouro/h', rateExpH: 'exp/h',
    bNow: 'agora', bGold: 'melhor ouro', bExp: 'melhor exp',
    diff_NIGHTMARE: 'Pesadelo', diff_HELL: 'Inferno', diff_TORMENT: 'Tormento',
    noStages: 'Nenhum estágio disponível ainda.',
    cal_none: 'sem calibração', cal_noneNote: '(modelo estimado)',
    cal_calibrating: 'calibrando…', cal_fit: 'calibrado ({0} estágios)', cal_live: 'calibrado (ao vivo)',
    cal_hint: 'Deixe o jogo aberto e farmando — calibra quando o jogo salva algumas vezes com ouro ganho (≈1–2 min). O número são as amostras coletadas até agora.',
    err_decryptTitle: 'Erro ao decifrar save',
    err_decryptMsg: 'Pode ser um problema de versão do jogo. ',
    err_notFoundTitle: 'Save não encontrado',
    err_notFoundMsg: 'O TBH precisa estar instalado e ter sido aberto ao menos uma vez.\n\nCaminho esperado:\n{0}',
    err_readTitle: 'Erro ao ler o arquivo',
  },
};
let LANG = localStorage.getItem('tbh_lang') || ((navigator.language || 'en').toLowerCase().startsWith('pt') ? 'pt' : 'en');
const T = (k, ...a) => {
  let s = (STRINGS[LANG] && STRINGS[LANG][k]) || STRINGS.en[k] || k;
  a.forEach((v, i) => { s = s.replace('{' + i + '}', v); });
  return s;
};

const nm = m => I18N.entityName(m, STRINGS[LANG].locale);
const stageName  = k => { const s = DB.stages[String(k)]; return s ? nm(s.name) : '#' + k; };
const stageLabel = k => { const s = DB.stages[String(k)]; return s ? s.label   : '#' + k; };

const fmt  = n => n == null ? '—' : n >= 1e9 ? +(n/1e9).toFixed(2)+'B' : n >= 1e6 ? +(n/1e6).toFixed(2)+'M' : n >= 1e3 ? +(n/1e3).toFixed(1)+'k' : Math.round(n);
const fmtK = n => fmt(Math.round(n || 0));
const $ = id => document.getElementById(id);

let farmSort    = localStorage.getItem('tbh_farmsort') || 'gold';
let farmHorizon = +(localStorage.getItem('tbh_farmhz')) || 5;
let lastRec     = null;
let pollTimer   = null;
let pollMs      = 3000;

// view = overlay state: {mode:'loading'} | {mode:'error', titleKey, msgKey, arg} | {mode:'content'}
let view = { mode: 'loading' };
// status = header status: {state, key}
let status = { state: '', key: 'st_waiting' };

// ── init sort/horizon buttons ─────────────
document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('on', b.dataset.s === farmSort));
document.querySelectorAll('.hz-btn').forEach(b => b.classList.toggle('on', +b.dataset.h === farmHorizon));

function setSort(btn) {
  farmSort = btn.dataset.s;
  localStorage.setItem('tbh_farmsort', farmSort);
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('on', b === btn));
  if (lastRec) render(lastRec);
}
function setHorizon(btn) {
  farmHorizon = +btn.dataset.h;
  localStorage.setItem('tbh_farmhz', farmHorizon);
  document.querySelectorAll('.hz-btn').forEach(b => b.classList.toggle('on', b === btn));
  if (lastRec) render(lastRec);
}

function toggleLang() {
  LANG = LANG === 'en' ? 'pt' : 'en';
  localStorage.setItem('tbh_lang', LANG);
  applyLang();
}

// ── apply all static/translated strings ───
function applyLang() {
  $('langBtn').textContent = LANG === 'en' ? 'PT' : 'EN';
  document.documentElement.lang = STRINGS[LANG].locale;
  $('readonlyBadge').textContent = T('readonly');
  $('readonlyBadge').title = T('readonlyTitle');
  $('pPartyLbl').textContent = T('partyLv');
  $('pGoldLbl').textContent  = T('gold');
  $('pExpLbl').textContent   = T('exp');
  $('sortLbl').textContent   = T('sortLbl');
  $('projLbl').textContent   = T('projLbl');
  document.querySelector('.sort-btn[data-s="gold"]').textContent = T('sortGold');
  document.querySelector('.sort-btn[data-s="exp"]').textContent  = T('sortExp');
  $('statusTxt').textContent = T(status.key);
  if (view.mode !== 'content') renderOverlay();
  if (lastRec) render(lastRec);
}

// ── status helpers ────────────────────────
function setStatus(state, key) {
  status = { state, key };
  $('statusDot').className = state === 'live' ? 'live' : state === 'err' ? 'err' : '';
  $('statusTxt').textContent = T(key);
}

// ── live calibration (measure real gold/exp/clear from the save) ──
let samples = [], lastStageKey = null, clearStore = {};
try { clearStore = JSON.parse(localStorage.getItem('tbh_clearmodel') || '{}'); } catch (e) {}

function pushSample(psd) {
  const c = psd.commonSaveData;
  if (String(c.currentStageKey) !== lastStageKey) { samples = []; lastStageKey = String(c.currentStageKey); }
  const pt = Math.round(c.playTime || 0);
  const g = ENG.gold(psd), x = ENG.partyExp(psd), cl = ENG.totalClears(psd);
  const last = samples[samples.length - 1];
  if (!last || last.pt !== pt || last.g !== g) samples.push({ pt, g, x, c: cl });
  if (samples.length > 400) samples.shift();
}
// average rate of field f over sample deltas (only counts positive gains)
function rateOf(f) {
  if (samples.length < 2) return null;
  let gain = 0, dt = 0;
  for (let i = 1; i < samples.length; i++) {
    const dp = samples[i].pt - samples[i - 1].pt, dg = (samples[i][f] || 0) - (samples[i - 1][f] || 0);
    if (dp > 0) { dt += dp; if (dg > 0) gain += dg; }
  }
  return dt > 0 ? gain / dt : null;
}
function measuredClearSec() {
  if (samples.length < 2) return null;
  let dc = 0, dt = 0;
  for (let i = 1; i < samples.length; i++) {
    const dp = samples[i].pt - samples[i - 1].pt, dcl = (samples[i].c || 0) - (samples[i - 1].c || 0);
    if (dp > 0 && dcl > 0) { dt += dp; dc += dcl; }
  }
  return dc > 0 ? dt / dc : null;
}
// persist the measured clear time per stage → fit model across stages.
// Stamp the party DPS so we can detect when the model is stale (you got stronger).
function storeClear(psd, cs, dps) {
  if (cs == null || !(cs > 5 && cs < 900)) return;
  const sk = String(psd.commonSaveData.currentStageKey), st = DB.stages[sk];
  if (!st) return;
  clearStore[sk] = { hp: st.totalHP, waves: st.waves, clearSec: cs, dps: dps || 0 };
  try { localStorage.setItem('tbh_clearmodel', JSON.stringify(clearStore)); } catch (e) {}
}
// Drop stored clears measured at a very different power level — a clear time
// from when you were 1.35× weaker/stronger no longer reflects reality. This
// makes the model recalibrate automatically after a damage jump.
function pruneStaleClears(curDps) {
  if (!(curDps > 0)) return false;
  let changed = false;
  for (const k of Object.keys(clearStore)) {
    const d = clearStore[k].dps;
    if (d > 0 && (curDps > d * 1.35 || curDps < d * 0.74)) { delete clearStore[k]; changed = true; }
  }
  if (changed) { try { localStorage.setItem('tbh_clearmodel', JSON.stringify(clearStore)); } catch (e) {} }
  return changed;
}

// ── save decryption ───────────────────────
async function decryptSave(b64) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv    = bytes.slice(0, 16);
  const ct    = bytes.slice(16);
  const raw   = new TextEncoder().encode(PASSWORD);
  const base  = await crypto.subtle.importKey('raw', raw, { name: 'PBKDF2' }, false, ['deriveKey']);
  const key   = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: iv, iterations: 100, hash: 'SHA-1' },
    base,
    { name: 'AES-CBC', length: 128 },
    false, ['decrypt']
  );
  let out = new Uint8Array(await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, ct));
  if (out[0] === 0x1f && out[1] === 0x8b) {
    out = new Uint8Array(
      await new Response(
        new Blob([out]).stream().pipeThrough(new DecompressionStream('gzip'))
      ).arrayBuffer()
    );
  }
  return JSON.parse(new TextDecoder().decode(out));
}

// ── main load + poll ──────────────────────
async function loadSave(b64) {
  try {
    const raw = await decryptSave(b64);
    const psd = ENG.parseSave(raw.PlayerSaveData.value);

    // feed the calibration sampler with this fresh save
    pushSample(psd);
    const gps = rateOf('g'), eps = rateOf('x'), cs = measuredClearSec();

    const opts = {
      goldPerSec:   gps != null ? gps : undefined,
      expPerSec:    eps != null ? eps : undefined,
      clearSec:     cs  != null ? cs  : undefined,
      clearSamples: Object.values(clearStore),
      elapsedSec:   0,
    };
    let rec = ENG.recommend(psd, opts);

    // now that we know the current party DPS, drop any stored clears measured at
    // a very different power level, store this stage's clear, and recompute if stale
    const dps = rec.meta.partyDPS;
    const pruned = pruneStaleClears(dps);
    storeClear(psd, cs, dps);
    if (pruned) { opts.clearSamples = Object.values(clearStore); rec = ENG.recommend(psd, opts); }

    lastRec = rec;
    render(rec);
    setStatus('live', 'st_live');
    showContent();
  } catch (e) {
    setStatus('err', 'st_readErr');
    showError('err_decryptTitle', 'err_decryptMsg', e.message);
  }
}

async function init() {
  setStatus('', 'st_reading');
  const res = await window.tbhAPI.readSave();
  if (res.error === 'notfound') {
    setStatus('err', 'st_notFound');
    showError('err_notFoundTitle', 'err_notFoundMsg', res.path);
    return;
  }
  if (res.error) {
    setStatus('err', 'st_error');
    showError('err_readTitle', null, res.error);
    return;
  }
  await loadSave(res.data);
  startPoll();
}

async function forceRefresh() {
  clearTimeout(pollTimer);
  const res = await window.tbhAPI.readSave();
  if (res.data) await loadSave(res.data);
  startPoll();
}

function startPoll() {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(poll, pollMs);
}

async function poll() {
  const res = await window.tbhAPI.checkSave();
  if (res.changed && res.data) {
    pollMs = 3000;
    await loadSave(res.data);
  } else {
    pollMs = Math.min(Math.round(pollMs * 1.3), 15000);
  }
  startPoll();
}

// ── overlay (loading / error) ─────────────
function renderOverlay() {
  const ov = $('overlay');
  if (view.mode === 'loading') {
    ov.innerHTML = `<div class="icon">⚔️</div><h2>${T('loadingTitle')}</h2><p>${T('loadingMsg')}</p>`;
  } else if (view.mode === 'error') {
    const msg = (view.msgKey ? T(view.msgKey, view.arg || '') : (view.arg || ''));
    ov.innerHTML = `<div class="icon">⚠️</div><h2>${T(view.titleKey)}</h2><p>${String(msg).replace(/\n/g, '<br>')}</p>`;
  }
}
function showContent() {
  view = { mode: 'content' };
  $('overlay').style.display = 'none';
  $('content').style.display = '';
  $('partyBar').style.display = '';
}
function showError(titleKey, msgKey, arg) {
  view = { mode: 'error', titleKey, msgKey, arg };
  $('content').style.display = 'none';
  $('partyBar').style.display = 'none';
  $('overlay').style.display = '';
  renderOverlay();
}

// ── rendering ─────────────────────────────
const DIFF_COL = { NIGHTMARE: 'var(--warn)', HELL: 'var(--bad)', TORMENT: 'var(--violet)' };
const diffName = d => (d && d !== 'NORMAL') ? T('diff_' + d) : '';

function diffBadge(diff) {
  if (!diff || diff === 'NORMAL') return '';
  const col = DIFF_COL[diff] || 'var(--warn)';
  return `<span class="diff-badge" style="color:${col}">${diffName(diff)}</span>`;
}

function stageCell(key, diff) {
  return `<div class="td-label">${stageLabel(key)}${diffBadge(diff)}</div>`
       + `<div class="td-name">${stageName(key)}</div>`;
}

function card(cls, tagKey, r) {
  const col = DIFF_COL[r.diff];
  return `
  <div class="fcard ${cls}">
    <span class="tag">${T(tagKey)}</span>
    <div class="stage-id">${stageLabel(r.key)}</div>
    <div class="stage-name">${stageName(r.key)}${col ? `&nbsp;<span class="diff-badge" style="color:${col}">${diffName(r.diff)}</span>` : ''} · Lv${r.lvl}</div>
    <div class="rates">
      <span class="g">${fmtK(r.goldPerHour||0)}</span> ${T('rateGoldH')} &nbsp;·&nbsp;
      <span class="x">${fmtK(r.expPerHour||0)}</span> ${T('rateExpH')}
    </div>
  </div>`;
}

function render(rec) {
  const f = rec.farm;

  // party bar
  $('pLv').textContent   = f.partyLevel || '?';
  $('pGold').textContent = '+' + (f.goldBonusPct || 0) + '%';
  $('pExp').textContent  = '+' + (f.expBonusPct  || 0) + '%';
  const calEl = $('pCal'), calNote = $('calNote');
  calEl.title = '';
  if (!f.calibrated) {
    // not calibrated yet — show "calibrating… (N)" so progress is visible.
    // It only leaves this state once the game autosaves twice with gold gained.
    const warming = samples.length >= 1;
    calEl.textContent = warming ? T('cal_calibrating') + ' (' + samples.length + ')' : T('cal_none');
    calEl.style.color = warming ? 'var(--warn)' : 'var(--mut)';
    calEl.title = T('cal_hint');
    calNote.textContent = warming ? '' : T('cal_noneNote'); calNote.className = '';
  } else if (f.calSource === 'fit') {
    calEl.textContent = T('cal_fit', f.stagesMeasured || 0); calEl.style.color = 'var(--good)';
    calNote.textContent = ''; calNote.className = 'ok';
  } else {
    calEl.textContent = T('cal_live'); calEl.style.color = 'var(--good)';
    calNote.textContent = ''; calNote.className = 'ok';
  }

  // cards
  let cards = '';
  if (f.current) cards += card('now', 'cardNow', f.current);
  const sameAsCur = r => f.current && r && r.key === f.current.key;
  if (f.bestGold && !sameAsCur(f.bestGold)) cards += card('gold', 'cardGold', f.bestGold);
  if (f.bestExp  && !sameAsCur(f.bestExp) && (!f.bestGold || f.bestExp.key !== f.bestGold.key))
    cards += card('exp', 'cardExp', f.bestExp);
  if (f.push) cards += card('push', 'cardPush', f.push);
  $('cards').innerHTML = cards || `<div style="color:var(--mut)">${T('noStages')}</div>`;

  // table — same farmable pool the engine ranks over
  const all   = (f.all || []).filter(r => r.cleared || (f.current && r.key === f.current.key));
  const carry = (rec.level || []).slice().sort((a, b) => b.level - a.level)[0]
              || { level: f.partyLevel || 1, heroExp: 0 };
  const HRS   = [1, 3, 5, 8];
  const gold  = farmSort === 'gold';
  const proj  = (r, h) => gold
    ? (r.goldPerHour || 0) * h
    : ENG.projectLevel(carry.level, carry.heroExp, r.expPerSec, r.lvl, h);
  const fmtH  = (n) => gold ? fmtK(n) : (n != null ? n.toFixed(1) : '-');

  all.sort((a, b) => proj(b, farmHorizon) - proj(a, farmHorizon));

  const ths = HRS.map(h => `<th class="hz-col">${h}h</th>`).join('');

  const rows = all.map(r => {
    const isCur      = f.current && r.key === f.current.key;
    const isBestGold = f.bestGold && r.key === f.bestGold.key;
    const isBestExp  = f.bestExp  && r.key === f.bestExp.key;
    const rowCls     = isCur ? 'is-cur' : isBestGold ? 'is-best-gold' : isBestExp ? 'is-best-exp' : '';
    const badges     = (isCur      ? `<span class="row-badge rb-cur">${T('bNow')}</span>`  : '')
                     + (isBestGold ? `<span class="row-badge rb-gold">${T('bGold')}</span>` : '')
                     + (isBestExp  ? `<span class="row-badge rb-exp">${T('bExp')}</span>`  : '');
    const projCols = HRS.map(h => {
      const cls = h === farmHorizon ? 'td-proj' : '';
      return `<td class="${cls}">${fmtH(proj(r, h))}</td>`;
    }).join('');
    return `<tr class="${rowCls}">
      <td>${stageCell(r.key, r.diff)}${badges}</td>
      <td class="td-x">${fmtK(r.expPerHour||0)}</td>
      <td class="td-g">${fmtK(r.goldPerHour||0)}</td>
      ${projCols}
    </tr>`;
  }).join('');

  $('tbl-body').innerHTML = `
    <table>
      <thead>
        <tr>
          <th style="text-align:left">${T('colStage')}</th>
          <th>EXP/H</th>
          <th>GOLD/H</th>
          ${ths}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── start ─────────────────────────────────
applyLang();
init();
</script>
</body>
</html>
